<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng nhập</title>
  <style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .login-box {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 320px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .login-box h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #333;
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.3s;
  }

  input:focus {
    border-color: #667eea;
    box-shadow: 0 0 5px rgba(102,126,234,0.5);
  }

  button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }

  .error {
    color: red;
    text-align: center;
    margin-top: 10px;
  }
</style>
</head>
<body>

<div class="login-box">
  <h2>Đăng nhập</h2>
  <input type="text" id="username" placeholder="Tài khoản">
  <input type="password" id="password" placeholder="Mật khẩu">
  <button onclick="login()">Đăng nhập</button>
  <p><a href="forgot-password.html">Quên mật khẩu?</a></p>
  <p><a href="register.html">Chưa có tài khoản? Đăng ký ngay</a></p>
  <p class="error" id="error"></p>
</div>

<script>
async function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  const res = await fetch("https://phong-dun.vercel.app/api/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ user, pass })
  });

  const data = await res.json();

  if (data.message === "Đăng nhập thành công") {
    // lưu trạng thái đăng nhập
    localStorage.setItem("user", user);

    // chuyển trang
    window.location.href = "home.html";
  } else {
    document.getElementById("error").innerText = data.message;
  }
}
</script>

</body>
</html>
