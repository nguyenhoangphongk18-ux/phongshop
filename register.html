<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng ký</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #43cea2, #185a9d);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #43cea2;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #36b18a;
    }

    .msg {
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Đăng ký</h2>
  <input type="text" id="user" placeholder="Tài khoản">
  <input type="password" id="pass" placeholder="Mật khẩu">
  <input type="password" id="repass" placeholder="Nhập lại mật khẩu">
  <button onclick="register()">Đăng ký</button>
  <p><a href="index.html">Đã có tài khoản? Đăng nhập ngay</a></p>
  <p class="msg" id="msg"></p>
</div>

<script>
async function register() {
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  const res = await fetch("/api/register", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ user, pass })
  });

  const data = await res.json();
  alert(data.message);
}
</script>

</body>
</html>
